<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Shario Bros</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 800 / 480;
            max-height: 100vh;
            background-color: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            border: 2px solid #444;
            overflow: hidden;
            transition: filter 0.3s;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .high-contrast #game-container {
            filter: contrast(160%) saturate(140%) brightness(1.1);
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 10px; box-sizing: border-box;
        }

        .hud { position: absolute; font-size: 10px; text-shadow: 2px 2px 0 #000; }
        @media (min-width: 600px) { .hud { font-size: 12px; } }

        #level-display { top: 15px; left: 15px; color: #fff; }
        #score-display { top: 35px; left: 15px; color: #fff; }
        #coins-display { top: 15px; left: 50%; transform: translateX(-50%); color: #facc15; }
        #power-display { top: 35px; left: 50%; transform: translateX(-50%); color: #38bdf8; text-align: center; }
        #lives-display { top: 15px; right: 15px; color: #fff; }
        #boss-hp-display { top: 35px; right: 15px; color: #ef4444; display: none; }

        /* Setup Icon */
        #settings-btn {
            position: absolute;
            bottom: 15px; right: 15px;
            font-size: 20px; background: none; border: none; color: rgba(255,255,255,0.5);
            cursor: pointer; pointer-events: auto; z-index: 20; padding: 10px;
        }
        #settings-btn:hover { color: #fff; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            transition: opacity 0.3s; z-index: 50; pointer-events: auto;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        h1 { color: #ef4444; font-size: 28px; margin-bottom: 10px; text-shadow: 4px 4px 0 #b91c1c; line-height: 1.5; }
        p { font-size: 10px; line-height: 2; color: #d1d5db; max-width: 80%; margin-bottom: 20px;}
        
        .btn {
            margin-top: 10px; padding: 12px 24px; background-color: #ef4444; color: white;
            border: 4px solid #fff; font-family: inherit; font-size: 14px; cursor: pointer;
            text-transform: uppercase;
        }
        .btn:hover { background-color: #dc2626; transform: scale(1.05); }

        /* Settings Menu */
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px 30px;
            text-align: left; background: #222; padding: 20px; border: 4px solid #555;
            max-width: 90%; max-height: 60vh; overflow-y: auto;
        }
        .settings-grid label {
            font-size: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #ccc;
        }
        .settings-grid select {
            font-family: inherit; font-size: 10px; padding: 4px; background: #000; color: #fff; border: 2px solid #555;
        }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: #ef4444; }

        @media(max-width: 600px) { .settings-grid { grid-template-columns: 1fr; gap: 15px; } }

        /* Mobile Controls */
        #touch-controls {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 0; width: 100%; height: auto;
            pointer-events: none; display: flex; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 9999;
        }

        .d-pad, .action-btns { display: flex; gap: 12px; align-items: flex-end; pointer-events: auto; }
        
        .t-btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: rgba(255, 255, 255, 0.9);
            touch-action: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.1s; flex-shrink: 0;
        }
        .t-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.95); }

        body.big-buttons #touch-controls { padding: 0 10px; }
        body.big-buttons .t-btn { width: 85px; height: 85px; font-size: 32px; border-width: 4px; }

        @media (max-width: 400px) {
            .t-btn { width: 55px; height: 55px; font-size: 18px; }
            .d-pad, .action-btns { gap: 8px; }
            #touch-controls { padding: 0 10px; bottom: 15px; }
            body.big-buttons .t-btn { width: 65px; height: 65px; font-size: 22px; }
        }

        body.one-btn-mode #touch-controls { display: none !important; }
        #one-btn-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 90; display: none; touch-action: none;
        }
        body.one-btn-mode #one-btn-area { display: block; }
        .one-btn-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            font-size: 14px; color: rgba(255,255,255,0.4); pointer-events: none; display: none;
        }
        body.one-btn-mode .one-btn-hint { display: block; }

        @media (pointer: fine) { #touch-controls { opacity: 0; pointer-events: none; } }
        @media (max-width: 768px) { 
            #touch-controls { opacity: 1; } 
            h1 { font-size: 20px; } 
            #game-container { border: none; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="480"></canvas>
            
            <div id="ui-layer">
                <div id="level-display" class="hud">LEVEL: 1</div>
                <div id="score-display" class="hud">SCORE: 000000</div>
                <div id="coins-display" class="hud">COINS: 00</div>
                <div id="power-display" class="hud"></div>
                <div id="lives-display" class="hud">LIVES: 3</div>
                <div id="boss-hp-display" class="hud">BOSS HP: III</div>
                <button id="settings-btn">⚙️</button>
            </div>

            <div id="menu-overlay" class="overlay">
                <h1 id="menu-title">SUPER<br>SHARIO BROS</h1>
                <p id="menu-desc">Explore massive maps, discover 100+ unique powers, and defeat King Shroom!</p>
                <button id="start-btn" class="btn">PLAY GAME</button>
            </div>

            <div id="settings-overlay" class="overlay hidden">
                <h1 style="color: #fff; margin-bottom: 30px;">SETTINGS</h1>
                <div class="settings-grid">
                    <label><input type="checkbox" id="opt-sound" checked> Sound & Music</label>
                    <label><input type="checkbox" id="opt-one-button"> One-Button Mode</label>
                    <label><input type="checkbox" id="opt-auto-jump"> Auto-Jump</label>
                    <label><input type="checkbox" id="opt-auto-shoot"> Auto-Shoot</label>
                    <label>Speed: 
                        <select id="opt-speed">
                            <option value="0.7">Slow</option>
                            <option value="1" selected>Normal</option>
                            <option value="1.3">Fast</option>
                        </select>
                    </label>
                    <label><input type="checkbox" id="opt-high-contrast"> High Contrast</label>
                    <label><input type="checkbox" id="opt-reduced-motion"> Reduced Motion</label>
                    <label><input type="checkbox" id="opt-big-buttons"> Big Touch Buttons</label>
                    <label><input type="checkbox" id="opt-vibration" checked> Vibration (Haptics)</label>
                </div>
                <button id="close-settings-btn" class="btn" style="margin-top: 30px;">RESUME</button>
            </div>
        </div>
        
        <div id="touch-controls">
            <div class="d-pad">
                <div class="t-btn" id="btn-left">◀</div>
                <div class="t-btn" id="btn-right">▶</div>
            </div>
            <div class="action-btns">
                <div class="t-btn" id="btn-shoot">🔥</div>
                <div class="t-btn" id="btn-jump">▲</div>
            </div>
        </div>

        <div id="one-btn-area"></div>
        <div class="one-btn-hint">TAP ANYWHERE TO JUMP / SHOOT</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const levelEl = document.getElementById('level-display');
        const scoreEl = document.getElementById('score-display');
        const coinsEl = document.getElementById('coins-display');
        const powerEl = document.getElementById('power-display');
        const livesEl = document.getElementById('lives-display');
        const bossHpEl = document.getElementById('boss-hp-display');
        const menuOverlay = document.getElementById('menu-overlay');
        const menuTitle = document.getElementById('menu-title');
        const menuDesc = document.getElementById('menu-desc');
        const startBtn = document.getElementById('start-btn');

        // --- 8-BIT AUDIO ENGINE ---
        const AudioEngine = (() => {
            let ac = null;
            let masterGain = null;
            let musicGain = null;
            let sfxGain = null;
            let isMuted = false;
            let musicInterval = null;
            let currentTheme = null;

            const init = () => {
                if (ac) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return; 
                ac = new AudioContext();
                masterGain = ac.createGain();
                musicGain = ac.createGain();
                sfxGain = ac.createGain();
                musicGain.gain.value = 0.15; // BGM volume
                sfxGain.gain.value = 0.3;    // SFX volume
                musicGain.connect(masterGain);
                sfxGain.connect(masterGain);
                masterGain.connect(ac.destination);
                applyMute();
            };

            const applyMute = () => { if (masterGain) masterGain.gain.value = isMuted ? 0 : 1; };
            const setMute = (mute) => { isMuted = mute; applyMute(); if(!mute && ac && ac.state === 'suspended') ac.resume(); };

            const playTone = (freq, type, duration, slideFreq) => {
                if (isMuted || !ac) return;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ac.currentTime);
                if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, ac.currentTime + duration);
                
                gain.gain.setValueAtTime(1, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + duration);
                osc.connect(gain); gain.connect(sfxGain);
                osc.start(); osc.stop(ac.currentTime + duration);
            };

            const playNote = (freq, type, duration) => {
                if (isMuted || !ac) return;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(1, ac.currentTime);
                gain.gain.setTargetAtTime(0.01, ac.currentTime + duration * 0.8, duration * 0.2);
                osc.connect(gain); gain.connect(musicGain);
                osc.start(); osc.stop(ac.currentTime + duration);
            };

            const SFX = {
                jump: () => playTone(300, 'sine', 0.25, 600),
                coin: () => { playTone(987, 'square', 0.1); setTimeout(() => playTone(1318, 'square', 0.3), 80); },
                powerup: () => { playTone(523, 'square', 0.1); setTimeout(() => playTone(659, 'square', 0.1), 100); setTimeout(() => playTone(783, 'square', 0.2), 200); },
                squish: () => playTone(150, 'triangle', 0.15, 50),
                shoot: () => playTone(800, 'sawtooth', 0.1, 200),
                die: () => { playTone(300, 'sawtooth', 0.2, 150); setTimeout(() => playTone(250, 'sawtooth', 0.2, 100), 200); setTimeout(() => playTone(200, 'sawtooth', 0.4, 50), 400); },
                bump: () => playTone(100, 'triangle', 0.1, 80),
                smash: () => playTone(80, 'sawtooth', 0.2, 40)
            };

            const THEMES = {
                overworld: { bpm: 150, type: 'triangle', notes: [261.63, null, 329.63, 392.00, 261.63, null, 329.63, 392.00] },
                underground: { bpm: 110, type: 'triangle', notes: [130.81, 146.83, 155.56, 146.83] },
                snow: { bpm: 130, type: 'sine', notes: [523.25, 659.25, 783.99, 1046.50, 783.99, 659.25] },
                castle: { bpm: 100, type: 'square', notes: [130.81, null, 123.47, null, 116.54, null, 123.47, null] },
                desert: { bpm: 140, type: 'triangle', notes: [293.66, 311.13, 349.23, 415.30, 349.23, 311.13] },
                forest: { bpm: 160, type: 'sine', notes: [329.63, 392.00, 329.63, 261.63] },
                space: { bpm: 180, type: 'sawtooth', notes: [440, 554.37, 659.25, 880, 659.25, 554.37] },
                volcano: { bpm: 160, type: 'square', notes: [110, 116.54, 123.47, 130.81, 123.47, 116.54] },
                boss: { bpm: 200, type: 'sawtooth', notes: [110, 110, 146.83, 164.81, 110, 110, 174.61, 164.81] },
                win: { bpm: 120, type: 'square', notes: [523.25, 659.25, 783.99, 1046.50] } 
            };

            const playMusic = (themeName) => {
                if (currentTheme === themeName) return;
                currentTheme = themeName;
                if (musicInterval) clearInterval(musicInterval);
                if (isMuted || !ac) return;

                let theme = THEMES[themeName];
                if (!theme || theme.notes.length === 0) return;

                let melodyStep = 0;
                let stepTime = (60 / theme.bpm) * 1000 / 2; 
                
                if (themeName === 'win') {
                    theme.notes.forEach((note, i) => { if (note) setTimeout(() => playNote(note, theme.type, stepTime/1000), i * stepTime); });
                    return;
                }

                musicInterval = setInterval(() => {
                    if (isMuted || !ac || ac.state === 'suspended') return;
                    let note = theme.notes[melodyStep];
                    if (note) playNote(note, theme.type, stepTime / 1000);
                    melodyStep = (melodyStep + 1) % theme.notes.length;
                }, stepTime);
            };

            const stopMusic = () => { if (musicInterval) clearInterval(musicInterval); currentTheme = null; };

            const getThemeForEnvironment = (level) => {
                if (level % 5 === 0) return 'boss';
                let cycle = level % 40; if (cycle === 0) cycle = 40;
                if (cycle <= 5) return 'overworld'; 
                if (cycle <= 10) return 'underground'; 
                if (cycle <= 15) return 'snow'; 
                if (cycle <= 20) return 'castle';
                if (cycle <= 25) return 'desert';
                if (cycle <= 30) return 'forest';
                if (cycle <= 35) return 'space';
                return 'volcano';
            };

            return { init, setMute, SFX, playMusic, stopMusic, getThemeForEnvironment, resume: () => { if(ac && ac.state === 'suspended') ac.resume(); } };
        })();
        // ------------------------

        const options = {
            sound: true, oneButton: false, autoJump: false, autoShoot: false,
            speed: 1.0, highContrast: false, reducedMotion: false,
            bigButtons: false, vibration: true
        };

        const applySettings = () => {
            options.sound = document.getElementById('opt-sound').checked;
            options.oneButton = document.getElementById('opt-one-button').checked;
            options.autoJump = document.getElementById('opt-auto-jump').checked;
            options.autoShoot = document.getElementById('opt-auto-shoot').checked;
            options.speed = parseFloat(document.getElementById('opt-speed').value);
            options.highContrast = document.getElementById('opt-high-contrast').checked;
            options.reducedMotion = document.getElementById('opt-reduced-motion').checked;
            options.bigButtons = document.getElementById('opt-big-buttons').checked;
            options.vibration = document.getElementById('opt-vibration').checked;

            AudioEngine.setMute(!options.sound);
            document.body.classList.toggle('one-btn-mode', options.oneButton);
            document.body.classList.toggle('big-buttons', options.bigButtons);
            document.body.classList.toggle('high-contrast', options.highContrast);
            
            if (options.oneButton) keys.left = false;
        };

        const settingsBtn = document.getElementById('settings-btn');
        const settingsOverlay = document.getElementById('settings-overlay');
        const closeSettingsBtn = document.getElementById('close-settings-btn');

        settingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('hidden');
            if (gameState.status === 'PLAYING') gameState.status = 'PAUSED';
        });
        closeSettingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.add('hidden');
            applySettings();
            if (gameState.status === 'PAUSED') {
                gameState.lastTime = performance.now();
                gameState.status = 'PLAYING';
                requestAnimationFrame(gameLoop);
            }
        });

        const triggerVibration = (ms) => {
            if (options.vibration && navigator.vibrate) {
                try { navigator.vibrate(ms); } catch (e) {}
            }
        };

        let GRAVITY = 2400; let MAX_FALL_SPEED = 1200;
        let WORLD_WIDTH = 5000; const WORLD_HEIGHT = 480;
        const keys = { left: false, right: false, jump: false, jumpJustPressed: false, shoot: false, shootJustPressed: false };

        window.addEventListener('keydown', (e) => {
            if (options.oneButton) { handleOneButtonPress(e); return; }
            if (['ArrowLeft', 'a', 'A'].includes(e.key)) keys.left = true;
            if (['ArrowRight', 'd', 'D'].includes(e.key)) keys.right = true;
            if (['ArrowUp', 'w', 'W', ' '].includes(e.key)) {
                if (!keys.jump) keys.jumpJustPressed = true; keys.jump = true; e.preventDefault();
            }
            if (['Shift', 'e', 'E', 'f', 'F'].includes(e.key)) {
                if (!keys.shoot) keys.shootJustPressed = true; keys.shoot = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (options.oneButton) { handleOneButtonRelease(e); return; }
            if (['ArrowLeft', 'a', 'A'].includes(e.key)) keys.left = false;
            if (['ArrowRight', 'd', 'D'].includes(e.key)) keys.right = false;
            if (['ArrowUp', 'w', 'W', ' '].includes(e.key)) { keys.jump = false; keys.jumpJustPressed = false; }
            if (['Shift', 'e', 'E', 'f', 'F'].includes(e.key)) { keys.shoot = false; keys.shootJustPressed = false; }
        });

        const bindTouch = (id, keyName, isPressEvent = false) => {
            const btn = document.getElementById(id);
            const press = (e) => { e.preventDefault(); if (isPressEvent && !keys[keyName]) keys[keyName+'JustPressed'] = true; keys[keyName] = true; };
            const release = (e) => { e.preventDefault(); keys[keyName] = false; if (isPressEvent) keys[keyName+'JustPressed'] = false; };
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('touchcancel', release, {passive: false});
        };
        bindTouch('btn-left', 'left'); bindTouch('btn-right', 'right');
        bindTouch('btn-jump', 'jump', true); bindTouch('btn-shoot', 'shoot', true);

        const oneBtnArea = document.getElementById('one-btn-area');
        const handleOneButtonPress = (e) => {
            if(e && e.preventDefault) e.preventDefault();
            if (!keys.jump) keys.jumpJustPressed = true; keys.jump = true;
            if (!keys.shoot) keys.shootJustPressed = true; keys.shoot = true;
        };
        const handleOneButtonRelease = (e) => {
            if(e && e.preventDefault) e.preventDefault();
            keys.jump = false; keys.jumpJustPressed = false;
            keys.shoot = false; keys.shootJustPressed = false;
        };
        oneBtnArea.addEventListener('touchstart', handleOneButtonPress, {passive: false});
        oneBtnArea.addEventListener('mousedown', handleOneButtonPress);
        oneBtnArea.addEventListener('touchend', handleOneButtonRelease, {passive: false});
        oneBtnArea.addEventListener('touchcancel', handleOneButtonRelease, {passive: false});
        oneBtnArea.addEventListener('mouseup', handleOneButtonRelease);

        function updateGamepad() {
            if (!navigator.getGamepads) return;
            const gps = navigator.getGamepads();
            if (!gps[0]) return;
            const gp = gps[0];
            
            if (options.oneButton) {
                const action = gp.buttons[0]?.pressed || gp.buttons[1]?.pressed || gp.buttons[2]?.pressed;
                if (action) handleOneButtonPress(); else handleOneButtonRelease();
                return;
            }

            keys.left = gp.axes[0] < -0.4 || gp.buttons[14]?.pressed;
            keys.right = gp.axes[0] > 0.4 || gp.buttons[15]?.pressed;

            const gpJump = gp.buttons[0]?.pressed || gp.buttons[1]?.pressed; 
            if (gpJump && !keys.jump) keys.jumpJustPressed = true;
            keys.jump = gpJump;

            const gpShoot = gp.buttons[2]?.pressed || gp.buttons[3]?.pressed;
            if (gpShoot && !keys.shoot) keys.shootJustPressed = true;
            keys.shoot = gpShoot;
        }

        function rectIntersectInset(r1, r2, shrinkX, shrinkY) { return r1.x + shrinkX < r2.x + r2.w && r1.x + r1.w - shrinkX > r2.x && r1.y + shrinkY < r2.y + r2.h && r1.y + r1.h - shrinkY > r2.y; }
        function rectIntersect(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

        const POWERS = {
            sizes: [ { name: "", scale: 1 }, { name: "Tiny ", scale: 0.5 }, { name: "Giant ", scale: 2 } ],
            speeds: [ { name: "Slow ", speedMod: 0.8 }, { name: "", speedMod: 1 }, { name: "Fast ", speedMod: 1.25 }, { name: "Sonic ", speedMod: 1.5 } ],
            jumps: [ { name: "Heavy ", jumpMod: 0.8, gravMod: 1.3 }, { name: "", jumpMod: 1, gravMod: 1 }, { name: "Moon ", jumpMod: 1.3, gravMod: 0.6 } ],
            abilities: [ { name: "Shroom", type: "none", color: "#38bdf8" }, { name: "Fireflower", type: "fire", color: "#ef4444" }, { name: "Iceflower", type: "ice", color: "#60a5fa" }, { name: "Ghost Star", type: "ghost", color: "#a3e635" } ]
        };

        function generateRandomPower() {
            const sz = POWERS.sizes[Math.floor(Math.random() * POWERS.sizes.length)];
            const sp = POWERS.speeds[Math.floor(Math.random() * POWERS.speeds.length)];
            const jm = POWERS.jumps[Math.floor(Math.random() * POWERS.jumps.length)];
            const ab = POWERS.abilities[Math.floor(Math.random() * POWERS.abilities.length)];
            let finalName = sz.name + sp.name + jm.name + ab.name;
            if(finalName === "Shroom") finalName = "Super Shroom"; 
            return { name: finalName, scale: sz.scale, speedMod: sp.speedMod, jumpMod: jm.jumpMod, gravMod: jm.gravMod, ability: ab.type, color: ab.color };
        }

        class Player {
            constructor(x, y) {
                this.startX = x; this.startY = y; this.x = x; this.y = y;
                this.baseW = 26; this.baseH = 36; this.w = this.baseW; this.h = this.baseH;
                this.vx = 0; this.vy = 0; this.grounded = false; this.facingRight = true;
                
                this.groundAccel = 1500; this.airAccel = 600; this.groundFriction = 1200; 
                this.airFriction = 150; this.skidFriction = 3000; this.maxWalkSpeed = 260;
                this.maxRunSpeed = 420; this.baseJump = -1550; 

                this.invincibleTimer = 0; this.coyoteTimer = 0; this.jumpBufferTimer = 0;
                this.powerTimer = 0; this.currentPower = null; this.autoShootCd = 0;
                this.isDead = false; this.deathTimer = 0;
            }

            applyPower(powerObj) {
                if (this.currentPower) {
                    const BASE_ABILITIES = ['fire', 'ice', 'ghost', 'none'];
                    let p1 = this.currentPower.ability;
                    let p2 = powerObj.ability;

                    // Only fuse base abilities to prevent recursive stacking
                    if (BASE_ABILITIES.includes(p1) && BASE_ABILITIES.includes(p2)) {
                        let fusedAbility = p2;
                        let fusedName = powerObj.name;
                        let fusedColor = powerObj.color;
                        let fusedScale = Math.max(this.currentPower.scale, powerObj.scale);
                        let fusedSpeed = Math.max(this.currentPower.speedMod, powerObj.speedMod);
                        let fusedJump = Math.max(this.currentPower.jumpMod, powerObj.jumpMod);
                        let fusedGrav = Math.min(this.currentPower.gravMod, powerObj.gravMod);

                        if ((p1 === 'fire' && p2 === 'ice') || (p1 === 'ice' && p2 === 'fire')) {
                            fusedAbility = 'plasma'; fusedName = "Plasma Fusion"; fusedColor = "#d946ef"; 
                        } else if ((p1 === 'fire' && p2 === 'ghost') || (p1 === 'ghost' && p2 === 'fire')) {
                            fusedAbility = 'wisp'; fusedName = "Wisp Fusion"; fusedColor = "#f97316"; 
                        } else if ((p1 === 'ice' && p2 === 'ghost') || (p1 === 'ghost' && p2 === 'ice')) {
                            fusedAbility = 'wraith'; fusedName = "Wraith Fusion"; fusedColor = "#2dd4bf"; 
                        } else if (p1 === 'fire' && p2 === 'fire') {
                            fusedAbility = 'inferno'; fusedName = "Inferno"; fusedColor = "#b91c1c"; 
                        } else if (p1 === 'ice' && p2 === 'ice') {
                            fusedAbility = 'blizzard'; fusedName = "Blizzard"; fusedColor = "#0284c7"; 
                        } else if (p1 === 'ghost' && p2 === 'ghost') {
                            fusedAbility = 'poltergeist'; fusedName = "Poltergeist"; fusedColor = "#84cc16"; 
                        } else if (p1 === 'none' || p2 === 'none') {
                            fusedAbility = p1 === 'none' ? p2 : p1;
                            fusedName = "Super " + (p1 === 'none' ? powerObj.name : this.currentPower.name);
                            fusedColor = p1 === 'none' ? powerObj.color : this.currentPower.color;
                            fusedScale = Math.min(3, fusedScale + 0.5); 
                        }

                        this.currentPower = {
                            name: fusedName, ability: fusedAbility, color: fusedColor, scale: fusedScale,
                            speedMod: fusedSpeed, jumpMod: fusedJump, gravMod: fusedGrav
                        };
                        this.powerTimer = 20; 
                        floatingTexts.push(new FloatingText("FUSION!", this.x + this.w/2, this.y - 40, "#facc15"));
                        AudioEngine.SFX.powerup(); 
                    } else {
                        // Overwrite if it's already an advanced fusion
                        this.currentPower = powerObj;
                        this.powerTimer = 15;
                    }
                } else {
                    this.currentPower = powerObj;
                    this.powerTimer = 15;
                }
                
                const oldW = this.w; const oldH = this.h;
                this.w = this.baseW * this.currentPower.scale; this.h = this.baseH * this.currentPower.scale;
                this.x -= (this.w - oldW) / 2; this.y -= (this.h - oldH) + 2; 
                if (this.y < 0) this.y = 0;
                
                powerEl.innerText = this.currentPower.name.toUpperCase();
                powerEl.style.color = this.currentPower.color;
                floatingTexts.push(new FloatingText(this.currentPower.name.toUpperCase(), this.x + this.w/2, this.y - 20, this.currentPower.color));
            }

            removePower() {
                if (!this.currentPower) return;
                const oldW = this.w; const oldH = this.h;
                this.w = this.baseW; this.h = this.baseH;
                this.x -= (this.w - oldW) / 2; this.y -= (this.h - oldH); 
                this.currentPower = null; this.powerTimer = 0; powerEl.innerText = "";
            }

            update(dt) {
                if (this.isDead) {
                    this.deathTimer -= dt;
                    this.vy += GRAVITY * dt;
                    this.y += this.vy * dt;
                    if (this.y > WORLD_HEIGHT + 100 || this.deathTimer <= 0) {
                        gameState.lives--; updateHUD();
                        if (gameState.lives <= 0) { endGame("GAME OVER", `You reached Level ${gameState.level}.`); } 
                        else { 
                            this.isDead = false; this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0; this.invincibleTimer = 2; 
                            AudioEngine.playMusic(AudioEngine.getThemeForEnvironment(gameState.level));
                        }
                    }
                    return;
                }

                if (options.oneButton) { keys.right = true; keys.left = false; }

                let targetMaxSpeed = keys.shoot ? this.maxRunSpeed : this.maxWalkSpeed;
                targetMaxSpeed *= (this.currentPower ? this.currentPower.speedMod : 1);
                let currentJump = this.baseJump * (this.currentPower ? this.currentPower.jumpMod : 1);
                let currentGrav = GRAVITY * (this.currentPower ? this.currentPower.gravMod : 1);

                let accel = this.grounded ? this.groundAccel : this.airAccel;
                let friction = this.grounded ? this.groundFriction : this.airFriction;
                let skid = this.grounded ? this.skidFriction : this.airAccel; 

                if (keys.left && !keys.right) { 
                    this.facingRight = false;
                    if (this.vx > 0) this.vx -= skid * dt; else this.vx -= accel * dt;
                } else if (keys.right && !keys.left) { 
                    this.facingRight = true;
                    if (this.vx < 0) this.vx += skid * dt; else this.vx += accel * dt;
                } else {
                    if (this.vx > 0) { this.vx -= friction * dt; if (this.vx < 0) this.vx = 0; } 
                    else if (this.vx < 0) { this.vx += friction * dt; if (this.vx > 0) this.vx = 0; }
                }

                if (this.vx > targetMaxSpeed) {
                    this.vx -= this.groundFriction * 1.5 * dt; 
                    if (this.vx < targetMaxSpeed && keys.right) this.vx = targetMaxSpeed;
                } else if (this.vx < -targetMaxSpeed) {
                    this.vx += this.groundFriction * 1.5 * dt;
                    if (this.vx > -targetMaxSpeed && keys.left) this.vx = -targetMaxSpeed;
                }

                if (options.autoJump && this.grounded && this.vx > 0) {
                    let lookAheadX = this.x + this.w + 15;
                    let obstacleAhead = false, pitAhead = true;
                    for (let p of platforms) {
                        if (p.y < this.y + this.h && p.y + p.h > this.y && p.x > this.x && p.x < lookAheadX) obstacleAhead = true;
                        if (p.x < lookAheadX + 15 && p.x + p.w > lookAheadX - 10 && p.y >= this.y + this.h - 5) pitAhead = false;
                    }
                    if (obstacleAhead || pitAhead) { keys.jumpJustPressed = true; keys.jump = true; }
                }

                if (this.grounded) this.coyoteTimer = 0.1; else this.coyoteTimer -= dt;
                if (keys.jumpJustPressed) { this.jumpBufferTimer = 0.1; keys.jumpJustPressed = false; } else { this.jumpBufferTimer -= dt; }

                if (this.jumpBufferTimer > 0 && this.coyoteTimer > 0) {
                    this.vy = currentJump; this.grounded = false;
                    this.jumpBufferTimer = 0; this.coyoteTimer = 0;
                    triggerVibration(10);
                    AudioEngine.SFX.jump(); // Play jump sound!
                }

                if (!keys.jump && this.vy < 0) this.vy += currentGrav * 3.5 * dt; else this.vy += currentGrav * dt;
                if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

                let canShoot = this.currentPower && ['fire', 'ice', 'plasma', 'inferno', 'blizzard', 'wisp', 'wraith'].includes(this.currentPower.ability);

                if (options.autoShoot && canShoot) {
                    this.autoShootCd -= dt;
                    if (this.autoShootCd <= 0) {
                        let nearest = enemies.find(e => !e.isDead && e.x > this.x && e.x < this.x + 350);
                        if (nearest && this.facingRight) { keys.shootJustPressed = true; keys.shoot = true; this.autoShootCd = 0.4; }
                    }
                }

                if (keys.shoot && keys.shootJustPressed && canShoot) {
                    let ab = this.currentPower.ability;
                    let px = this.x + this.w/2; let py = this.y + this.h/2;
                    let dir = this.facingRight ? 1 : -1;
                    
                    if (ab === 'inferno' || ab === 'blizzard') {
                        let pType = ab === 'inferno' ? 'fire' : 'ice';
                        projectiles.push(new Projectile(px, py, dir, pType, 'player', 0));
                        projectiles.push(new Projectile(px, py - 10, dir, pType, 'player', -250));
                        projectiles.push(new Projectile(px, py + 10, dir, pType, 'player', 150));
                    } else if (ab === 'plasma') {
                        projectiles.push(new Projectile(px, py, dir, 'plasma', 'player'));
                    } else if (ab === 'wisp') {
                        projectiles.push(new Projectile(px, py, dir, 'fire', 'player'));
                    } else if (ab === 'wraith') {
                        projectiles.push(new Projectile(px, py, dir, 'ice', 'player'));
                    } else {
                        projectiles.push(new Projectile(px, py, dir, ab, 'player'));
                    }

                    keys.shootJustPressed = false; triggerVibration(15);
                    AudioEngine.SFX.shoot();
                }

                if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
                if (this.powerTimer > 0) { this.powerTimer -= dt; if (this.powerTimer <= 0) this.removePower(); }

                if (this.x < 0) this.x = 0;
                if (this.x > WORLD_WIDTH - this.w) this.x = WORLD_WIDTH - this.w;
            }

            draw(ctx) {
                if (this.isDead) {
                    ctx.save(); ctx.translate(this.x + this.w / 2, this.y + this.h);
                    let hatColor = '#dc2626'; let shirtColor = '#ef4444'; let pantsColor = '#1d4ed8'; let skinColor = '#fcd34d'; let shoeColor = '#451a03'; let gloveColor = '#ffffff';
                    
                    ctx.fillStyle = shoeColor; ctx.beginPath(); ctx.roundRect(-12, -4, 8, 6, 3); ctx.fill(); ctx.beginPath(); ctx.roundRect(4, -4, 8, 6, 3); ctx.fill();
                    ctx.fillStyle = gloveColor; ctx.beginPath(); ctx.roundRect(-16, -30, 7, 7, 3); ctx.fill(); ctx.beginPath(); ctx.roundRect(9, -30, 7, 7, 3); ctx.fill();
                    const bodyGrad = ctx.createLinearGradient(0, -28, 0, -4);
                    bodyGrad.addColorStop(0, shirtColor); bodyGrad.addColorStop(0.55, shirtColor); bodyGrad.addColorStop(0.551, pantsColor); bodyGrad.addColorStop(1, pantsColor);
                    ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.roundRect(-10, -28, 20, 24, 8); ctx.fill();
                    ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(-4, -13, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -13, 2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = skinColor; ctx.beginPath(); ctx.roundRect(0, -24, 12, 12, 4); ctx.fill();
                    
                    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(1, -21); ctx.lineTo(4, -18); ctx.moveTo(4, -21); ctx.lineTo(1, -18); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(8, -21); ctx.lineTo(11, -18); ctx.moveTo(11, -21); ctx.lineTo(8, -18); ctx.stroke();
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(6, -15, 2.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
                    
                    ctx.fillStyle = hatColor; ctx.beginPath(); ctx.roundRect(-11, -31, 20, 8, 4); ctx.fill(); ctx.beginPath(); ctx.roundRect(-5, -25, 18, 3, 2); ctx.fill();  
                    ctx.restore();
                    return;
                }

                if (this.invincibleTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
                ctx.save(); ctx.translate(this.x + this.w / 2, this.y + this.h);
                if (!this.facingRight) ctx.scale(-1, 1);
                
                let scale = this.currentPower ? this.currentPower.scale : 1;
                ctx.scale(scale, scale);

                let hatColor = '#dc2626'; let shirtColor = '#ef4444'; let pantsColor = '#1d4ed8'; 
                let skinColor = '#fcd34d'; let shoeColor = '#451a03'; let gloveColor = '#ffffff';
                
                if (this.currentPower) {
                    if (options.highContrast) { ctx.shadowColor = this.currentPower.color; ctx.shadowBlur = 10 * scale; }
                    let ab = this.currentPower.ability;
                    
                    if (['fire', 'inferno', 'wisp'].includes(ab)) { hatColor = '#ffffff'; shirtColor = '#ffffff'; }
                    if (['ice', 'blizzard', 'wraith'].includes(ab)) { hatColor = '#60a5fa'; shirtColor = '#60a5fa'; }
                    if (ab === 'plasma') { hatColor = '#d946ef'; shirtColor = '#d946ef'; pantsColor = '#c026d3'; }
                    if (ab === 'poltergeist') { hatColor = '#84cc16'; shirtColor = '#84cc16'; }
                    if (['ghost', 'wisp', 'wraith', 'poltergeist'].includes(ab)) { ctx.globalAlpha = 0.5; }
                }

                const t = Date.now() / 100;
                const isMoving = Math.abs(this.vx) > 10;
                const animSpeed = Math.abs(this.vx) / 100;
                let fSwing = 0; let hSwing = 0; let bodyBounce = 0;

                if (!options.reducedMotion) {
                    if (this.grounded) {
                        if (isMoving) { fSwing = Math.sin(t * animSpeed) * 8; hSwing = Math.sin(t * animSpeed) * 6; bodyBounce = -Math.abs(Math.sin(t * animSpeed)) * 3; }
                    } else { fSwing = this.vy < 0 ? -6 : 6; hSwing = -8; }
                }
                ctx.translate(0, bodyBounce);

                ctx.fillStyle = shoeColor; ctx.beginPath(); ctx.roundRect(-fSwing - 4, -4, 10, 6, 3); ctx.fill();
                ctx.fillStyle = gloveColor; ctx.beginPath(); ctx.roundRect(hSwing + 4, -14, 6, 6, 3); ctx.fill();

                const bodyGrad = ctx.createLinearGradient(0, -28, 0, -4);
                bodyGrad.addColorStop(0, shirtColor); bodyGrad.addColorStop(0.55, shirtColor); bodyGrad.addColorStop(0.551, pantsColor); bodyGrad.addColorStop(1, pantsColor);
                ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.roundRect(-10, -28, 20, 24, 8); ctx.fill();

                ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(-4, -13, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -13, 2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = skinColor; ctx.beginPath(); ctx.roundRect(0, -24, 12, 12, 4); ctx.fill();
                ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.ellipse(4, -20, 1.5, 3, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(9, -20, 1.5, 3, 0, 0, Math.PI*2); ctx.fill();

                ctx.beginPath(); ctx.roundRect(4, -15, 8, 3, 2); ctx.fill();
                ctx.fillStyle = '#fbb117'; ctx.beginPath(); ctx.ellipse(11, -17, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();

                ctx.fillStyle = hatColor; ctx.beginPath(); ctx.roundRect(-11, -31, 20, 8, 4); ctx.fill(); ctx.beginPath(); ctx.roundRect(-5, -25, 18, 3, 2); ctx.fill();  

                ctx.fillStyle = shoeColor; ctx.beginPath(); ctx.roundRect(fSwing - 6, -4, 10, 6, 3); ctx.fill();
                ctx.fillStyle = gloveColor; ctx.beginPath(); ctx.roundRect(-hSwing - 8, -14, 7, 7, 3); ctx.fill();

                ctx.restore();
            }

            die(isPit = false) {
                triggerVibration([50, 50, 100]);
                if (this.currentPower && !isPit) {
                    this.removePower(); this.invincibleTimer = 2;
                    floatingTexts.push(new FloatingText("POWER LOST!", this.x, this.y, "#ef4444"));
                    this.vy = -400; 
                    return;
                }
                if (this.isDead) return;
                this.isDead = true;
                this.deathTimer = 3.0; 
                this.vx = 0;
                this.vy = isPit ? 0 : -900;
                
                AudioEngine.stopMusic(); 
                AudioEngine.SFX.die(); 
            }
        }

        class Projectile {
            constructor(x, y, dir, type, owner = 'player', vyInit = 0) {
                this.x = x; this.y = y; this.w = 12; this.h = 12;
                this.vx = 400 * dir; this.vy = vyInit; this.type = type; this.active = true;
                this.owner = owner;
            }
            update(dt) {
                this.vy += GRAVITY * dt; this.x += this.vx * dt;
                for (let p of platforms) if (rectIntersectInset(this, p, 0, 4)) this.active = false; 
                this.y += this.vy * dt;
                for (let p of platforms) {
                    if (rectIntersectInset(this, p, 4, 0)) {
                        if (this.vy > 0) { this.y = p.y - this.h; this.vy = -350; } else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
                    }
                }
                if (this.x < cameraX - 100 || this.x > cameraX + canvas.width + 100 || this.y > WORLD_HEIGHT) this.active = false;
            }
            draw(ctx) {
                ctx.fillStyle = this.type === 'fire' ? '#ef4444' : (this.type === 'ice' ? '#60a5fa' : (this.type === 'plasma' ? '#d946ef' : '#a855f7'));
                ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = options.highContrast ? 20 : 10;
                ctx.beginPath(); ctx.arc(this.x + this.w/2, this.y + this.h/2, this.w/2, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class PowerUp {
            constructor(x, y, dir = 1) {
                this.x = x + 8; this.y = y; this.w = 20; this.h = 20; this.vx = 0; this.vy = -100;
                this.state = 'spawning'; this.spawnTargetY = y - 24; this.powerData = generateRandomPower();
                this.spawnDir = dir;
            }
            update(dt) {
                if (this.state === 'spawning') {
                    this.y += this.vy * dt;
                    if (this.y <= this.spawnTargetY) { this.state = 'active'; this.vy = 0; this.vx = 60 * this.spawnDir; }
                } else {
                    this.vy += GRAVITY * dt; if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;
                    this.x += this.vx * dt;
                    for (let p of platforms) {
                        if (rectIntersectInset(this, p, 0, 4)) {
                            if (this.vx > 0) { this.x = p.x - this.w; this.vx *= -1; } else if (this.vx < 0) { this.x = p.x + p.w; this.vx *= -1; }
                        }
                    }
                    this.y += this.vy * dt;
                    for (let p of platforms) {
                        if (rectIntersectInset(this, p, 4, 0)) {
                            if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; } else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
                        }
                    }
                }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.shadowColor = this.powerData.color; ctx.shadowBlur = options.highContrast ? 25 : 15;
                if (['fire','ice'].includes(this.powerData.ability)) {
                    ctx.fillStyle = this.powerData.color;
                    for(let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.ellipse(0, -6, 4, 6, 0, 0, Math.PI*2); ctx.fill(); }
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = this.powerData.color; ctx.beginPath(); ctx.arc(0, -2, 10, Math.PI, 0); ctx.fill();
                    ctx.fillStyle = '#f0f9ff'; ctx.beginPath(); ctx.arc(-4, -6, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(4, -5, 2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#e0f2fe'; ctx.beginPath(); ctx.roundRect(-5, -2, 10, 10, 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        class Platform {
            constructor(x, y, w, h, type = 'ground') {
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.type = type; this.bumped = false; this.bumpAnimTimer = 0;
                this.infinite = false; this.cooldown = 0;
            }
            update(dt) { 
                if (this.bumpAnimTimer > 0) this.bumpAnimTimer -= dt; 
                if (this.infinite && this.bumped && this.cooldown > 0) {
                    this.cooldown -= dt;
                }
                if (this.infinite && this.bumped && this.cooldown <= 0 && (!player || !player.currentPower)) {
                    this.bumped = false;
                }
            }
            draw(ctx) {
                let drawY = this.y;
                if (!options.reducedMotion && this.bumpAnimTimer > 0) drawY -= Math.sin(this.bumpAnimTimer * Math.PI * 5) * 8; 

                if (this.type === 'ground') {
                    const grd = ctx.createLinearGradient(this.x, drawY, this.x, drawY + this.h);
                    grd.addColorStop(0, theme.dirtTop); grd.addColorStop(1, theme.dirtBottom);
                    ctx.fillStyle = grd; ctx.fillRect(this.x, drawY, this.w, this.h);
                    const grassGrd = ctx.createLinearGradient(this.x, drawY, this.x, drawY + 8);
                    grassGrd.addColorStop(0, theme.grassTop); grassGrd.addColorStop(1, theme.grassBottom);
                    ctx.fillStyle = grassGrd; ctx.fillRect(this.x, drawY, this.w, 8);
                } else if (this.type === 'brick') {
                    ctx.fillStyle = theme.brickColor; ctx.fillRect(this.x, drawY, this.w, this.h);
                    ctx.strokeStyle = theme.brickLine; ctx.lineWidth = 2; ctx.strokeRect(this.x, drawY, this.w, this.h);
                    ctx.beginPath(); ctx.moveTo(this.x, drawY + this.h/2); ctx.lineTo(this.x + this.w, drawY + this.h/2);
                    ctx.moveTo(this.x + this.w/2, drawY); ctx.lineTo(this.x + this.w/2, drawY + this.h/2); ctx.stroke();
                } else if (this.type === 'block') {
                    const blockGrd = ctx.createLinearGradient(this.x, drawY, this.x, drawY + this.h);
                    if (this.bumped) { blockGrd.addColorStop(0, theme.dirtTop); blockGrd.addColorStop(1, theme.dirtBottom); } 
                    else { blockGrd.addColorStop(0, '#fde047'); blockGrd.addColorStop(1, '#ca8a04'); }
                    ctx.fillStyle = blockGrd; ctx.fillRect(this.x, drawY, this.w, this.h);
                    ctx.strokeStyle = this.bumped ? theme.dirtBottom : '#a16207'; ctx.lineWidth = 2; ctx.strokeRect(this.x, drawY, this.w, this.h);
                    
                    if (!this.bumped) { 
                        ctx.fillStyle = '#a16207'; 
                        ctx.font = '16px "Press Start 2P"';
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('?', this.x + this.w/2 + 2, drawY + this.h/2 + 4);
                        
                        ctx.fillRect(this.x + 3, drawY + 3, 3, 3);
                        ctx.fillRect(this.x + this.w - 6, drawY + 3, 3, 3);
                        ctx.fillRect(this.x + 3, drawY + this.h - 6, 3, 3);
                        ctx.fillRect(this.x + this.w - 6, drawY + this.h - 6, 3, 3);
                    }
                }
            }
        }

        class Coin {
            constructor(x, y) { this.x = x; this.y = y; this.w = 16; this.h = 24; this.collected = false; this.animOffset = Math.random() * Math.PI; }
            update(dt) { if(!options.reducedMotion) this.animOffset += dt * 5; }
            draw(ctx) {
                if (this.collected) return;
                const floatY = options.reducedMotion ? 0 : Math.sin(this.animOffset) * 4;
                ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.ellipse(this.x + this.w/2, this.y + this.h/2 + floatY, this.w/2, this.h/2, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fef08a'; ctx.fillRect(this.x + this.w/2 - 2, this.y + 4 + floatY, 4, this.h - 8);
            }
        }

        class Enemy {

                    }
                    else if (chunkType === 2) { // Pillar (Pipe)
                        let w = 400; platforms.push(new Platform(cx, 420, w, 60, 'ground')); 
                        let pHeight = 64 + Math.random() * 64; platforms.push(new Platform(cx + 150, 420 - pHeight, 64, pHeight, 'brick')); 
                        enemies.push(new Enemy(cx + 250, 396, 'basic')); cx += w; 
                    }
                    else if (chunkType === 3) { // Pit
                        let w = 150 + (gameState.level * 3); if (w > 300) w = 300;
                        cx += w; // Empty space gap
                    }
                    else if (chunkType === 4) { // Staircase
                        let w = 600; platforms.push(new Platform(cx, 420, w, 60, 'ground')); 
                        for(let i=0; i<4; i++) platforms.push(new Platform(cx + 100 + (i*32), 420 - ((i+1)*32), 32, (i+1)*32, 'brick')); 
                        cx += w; 
                    }
                    else if (chunkType === 5) { // High Blocks
                        let w = 500; platforms.push(new Platform(cx, 420, w, 60, 'ground')); 
                        platforms.push(new Platform(cx + 100, 320, 32, 32, 'brick')); platforms.push(new Platform(cx + 200, 220, 32, 32, 'block')); platforms.push(new Platform(cx + 300, 320, 32, 32, 'brick')); coins.push(new Coin(cx + 208, 180)); 
                        cx += w; 
                    } 
                    else if (chunkType === 6) { // Long Run
                        let w = 800; platforms.push(new Platform(cx, 420, w, 60, 'ground')); 
                        enemies.push(new Enemy(cx + 300, 396, eType)); enemies.push(new Enemy(cx + 500, 396, 'basic')); 
                        cx += w;
                    }
                    else if (chunkType === 7) { // Flyers
                        let w = 600; platforms.push(new Platform(cx, 420, w, 60, 'ground')); 
                        if (gameState.level > 2) { enemies.push(new Enemy(cx + 200, 200, 'flyer')); enemies.push(new Enemy(cx + 400, 250, 'flyer')); }
                        cx += w;
                    }
                }
                
                platforms.push(new Platform(cx, 420, WORLD_WIDTH - cx, 60, 'ground')); 
                for(let i=0; i<6; i++) platforms.push(new Platform(WORLD_WIDTH - 600 + (i*32), 420 - (i+1)*32, 32, (i+1)*32, 'brick')); 
                goal = new Goal(WORLD_WIDTH - 200, 100);
            }
            player = new Player(100, 300); updateHUD();
        }

        function initGame(resetLevel = true) { 
            gameState.status = 'PLAYING'; 
            gameState.score = 0; 
            gameState.coins = 0; 
            gameState.lives = 3; 
            if (resetLevel) gameState.level = 1; 
            menuOverlay.classList.add('hidden'); 
            
            AudioEngine.init();
            AudioEngine.resume();

            buildLevel(); 
            gameState.lastTime = performance.now(); 
            requestAnimationFrame(gameLoop); 

            AudioEngine.playMusic(AudioEngine.getThemeForEnvironment(gameState.level));
        }
        function updateHUD() { levelEl.innerText = `LEVEL: ${gameState.level}`; scoreEl.innerText = `SCORE: ${gameState.score.toString().padStart(6, '0')}`; coinsEl.innerText = `COINS: ${gameState.coins.toString().padStart(2, '0')}`; livesEl.innerText = `LIVES: ${gameState.lives}`; }
        function endGame(title, desc) { gameState.status = title === "YOU WIN!" ? 'WIN' : 'GAMEOVER'; bossHpEl.style.display = 'none'; menuTitle.innerHTML = title; menuDesc.innerText = desc; startBtn.innerText = "PLAY AGAIN"; menuOverlay.classList.remove('hidden'); }
        function nextLevel() { 
            gameState.status = 'INTERMISSION'; gameState.level++; 
            if (gameState.level > 40) { endGame("YOU WIN!", `You saved the princess!\nFinal Score: ${gameState.score}`); } 
            else { 
                menuTitle.innerHTML = "LEVEL CLEAR!"; menuDesc.innerText = `Ready for Level ${gameState.level}?`; startBtn.innerText = "NEXT LEVEL"; menuOverlay.classList.remove('hidden'); 
                AudioEngine.stopMusic();
            } 
        }

        startBtn.addEventListener('click', () => {
            AudioEngine.init(); AudioEngine.resume(); // Ensure audio context starts on click
            if (gameState.status === 'INTERMISSION') { 
                gameState.status = 'PLAYING'; menuOverlay.classList.add('hidden'); buildLevel(); gameState.lastTime = performance.now(); requestAnimationFrame(gameLoop); 
                AudioEngine.playMusic(AudioEngine.getThemeForEnvironment(gameState.level));
            } else if (gameState.status === 'GAMEOVER') {
                initGame(false); 
            } else { 
                initGame(true); 
            }
        });

        function handleCollisions(dt) {
            player.x += player.vx * dt;
            for (let p of platforms) {
                if (rectIntersectInset(player, p, 0, 8)) { if (player.vx > 0) player.x = p.x - player.w; else if (player.vx < 0) player.x = p.x + p.w; player.vx = 0; }
            }

            player.y += player.vy * dt; player.grounded = false;
            for (let p of platforms) {
                if (rectIntersectInset(player, p, 6, 0)) {
                    let oldBottom = (player.y - player.vy * dt) + player.h;
                    let oldTop = player.y - player.vy * dt;

                    if (player.vy >= 0 && oldBottom <= p.y + 24) { 
                        player.y = p.y - player.h; player.grounded = true; player.vy = 0; 
                    } 
                    else if (player.vy < 0 && oldTop >= p.y + p.h - 24) { 
                        player.y = p.y + p.h; player.vy = 0;
                        if (p.type === 'block' && (!p.bumped || (p.infinite && !player.currentPower && p.cooldown <= 0))) { 
                            p.bumped = true; p.bumpAnimTimer = 0.2; 
                            if (p.infinite) p.cooldown = 1.0;
                            let spawnDir = player.x + player.w/2 < p.x + p.w/2 ? 1 : -1;
                            powerups.push(new PowerUp(p.x, p.y, spawnDir)); triggerVibration(15); 
                            AudioEngine.SFX.bump();
                        }
                        else if (p.type === 'brick') { 
                            p.destroyed = true; gameState.score += 50; triggerVibration(25);
                            particles.push(new Debris(p.x, p.y, -200, -500)); particles.push(new Debris(p.x + 16, p.y, 200, -500));
                            particles.push(new Debris(p.x, p.y + 16, -100, -350)); particles.push(new Debris(p.x + 16, p.y + 16, 100, -350));
                            AudioEngine.SFX.smash();
                        } else if (p.type === 'block') {
                            AudioEngine.SFX.bump();
                        }
                    }
                }
            }

            if (player.y > WORLD_HEIGHT && !player.isDead) player.die(true);
            if (goal && rectIntersect(player, goal)) { 
                gameState.score += 1000; triggerVibration([50,100,50]); updateHUD(); 
                AudioEngine.playMusic('win'); // Play win music!
                nextLevel(); 
            }

            for (let i = powerups.length - 1; i >= 0; i--) { let pw = powerups[i]; if (pw.state === 'active' && rectIntersect(player, pw)) { player.applyPower(pw.powerData); gameState.score += 500; powerups.splice(i, 1); updateHUD(); triggerVibration(20); AudioEngine.SFX.powerup(); } }
            for (let c of coins) { if (!c.collected && rectIntersect(player, c)) { c.collected = true; gameState.coins++; gameState.score += 50; if (gameState.coins >= 100) { gameState.coins = 0; gameState.lives++; triggerVibration([20,50,20]); } updateHUD(); triggerVibration(5); AudioEngine.SFX.coin(); } }

            for (let j = projectiles.length - 1; j >= 0; j--) {
                let proj = projectiles[j];
                if (proj.active && proj.owner === 'enemy' && rectIntersect(proj, player)) {
                    if (player.invincibleTimer <= 0 && (!player.currentPower || player.currentPower.ability !== 'ghost')) {
                        player.die(); proj.active = false;
                    }
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.isDead) { if (e.reactionTimer <= 0) enemies.splice(i, 1); continue; }
                
                for (let j = projectiles.length - 1; j >= 0; j--) { 
                    let proj = projectiles[j]; 
                    if (proj.active && proj.owner === 'player' && rectIntersect(proj, e)) { 
                        if (e.type === 'armored' && proj.type !== 'plasma') {
                            proj.active = false;
                            floatingTexts.push(new FloatingText("IMMUNE!", e.x, e.y, "#94a3b8"));
                            AudioEngine.SFX.bump();
                        } else {
                            e.die('random'); 
                            if (proj.type !== 'plasma') proj.active = false; // Plasma pierces!
                            gameState.score += 200; floatingTexts.push(new FloatingText("200", e.x, e.y)); updateHUD(); triggerVibration(10); 
                        }
                    } 
                }

                if (rectIntersect(player, e)) {
                    if (player.currentPower && ['ghost', 'wisp', 'wraith', 'poltergeist'].includes(player.currentPower.ability)) continue;
                    
                    let oldBottom = player.y - player.vy * dt + player.h;
                    if (player.vy > 0 && oldBottom <= e.y + 16) { 
                        e.die('squish'); player.vy = player.baseJump * 0.7; gameState.score += 200; floatingTexts.push(new FloatingText("200", e.x, e.y)); updateHUD(); triggerVibration(15); 
                    } 
                    else if (player.invincibleTimer <= 0) { 
                        if (e.type === 'thief' && player.currentPower) {
                            player.removePower(); player.invincibleTimer = 2;
                            floatingTexts.push(new FloatingText("STOLEN!", player.x, player.y, "#a855f7"));
                            e.die('vanish'); 
                        } else {
                            player.die(); 
                        }
                    }
                }
            }

            for (let b of bosses) {
                if (b.isDead || b.squishTimer > 0) continue;
                for (let j = projectiles.length - 1; j >= 0; j--) { 
                    let proj = projectiles[j]; 
                    if (proj.active && proj.owner === 'player' && rectIntersect(proj, b)) { 
                        if (b.takeDamage()) {
                            if (proj.type !== 'plasma') proj.active = false; // Plasma pierces bosses too
                        } 
                    } 
                }
                if (rectIntersect(player, b)) {
                    if (player.currentPower && ['ghost', 'wisp', 'wraith', 'poltergeist'].includes(player.currentPower.ability)) continue;
                    let oldBottom = player.y - player.vy * dt + player.h;
                    if (player.vy > 0 && oldBottom <= b.y + 24) { if (b.takeDamage()) player.vy = player.baseJump; } 
                    else if (player.invincibleTimer <= 0 && b.invincibilityTimer <= 0) { player.die(); }
                }
            }
        }

        function update(dt) {
            updateGamepad();
            player.update(dt); 
            if (player.isDead) return; 
            
            handleCollisions(dt);
            
            for (let i = platforms.length - 1; i >= 0; i--) { if (platforms[i].destroyed) platforms.splice(i, 1); else if (platforms[i].update) platforms[i].update(dt); }
            for (let e of enemies) e.update(dt); for (let b of bosses) b.update(dt); for (let pw of powerups) pw.update(dt); for (let c of coins) c.update(dt);
            for (let i = projectiles.length - 1; i >= 0; i--) { projectiles[i].update(dt); if (!projectiles[i].active) projectiles.splice(i, 1); }
            for (let i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(dt); if (floatingTexts[i].timer <= 0) floatingTexts.splice(i, 1); }
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(dt); if (!particles[i].active) particles.splice(i, 1); }

            if (gameState.level % 5 === 0) { cameraX = 200; } 
            else { cameraX = player.x + player.w/2 - canvas.width / 2; if (cameraX < 0) cameraX = 0; if (cameraX > WORLD_WIDTH - canvas.width) cameraX = WORLD_WIDTH - canvas.width; }
        }

        function drawBackground() {
            ctx.fillStyle = theme.sky || '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if(theme.clouds) {
                ctx.fillStyle = theme.clouds; 
                const bgCam = options.reducedMotion ? cameraX : cameraX * 0.15; 
                for(let i=0; i<Math.max(15, WORLD_WIDTH/400); i++) {
                    const cx = (i * 400 - bgCam);
                    if (cx > -200 && cx < canvas.width + 200) { let cy = 50 + (i%3)*40; ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI*2); ctx.arc(cx + 25, cy - 10, 25, 0, Math.PI*2); ctx.arc(cx + 50, cy, 20, 0, Math.PI*2); ctx.fill(); }
                }
            }

            if(theme.bgMtn) {
                ctx.fillStyle = theme.bgMtn; const mtnCam = options.reducedMotion ? cameraX : cameraX * 0.3;
                for(let i=0; i<Math.max(15, WORLD_WIDTH/500); i++) {
                    const mx = (i * 600 - mtnCam);
                    if (mx > -300 && mx < canvas.width + 300) {
                        ctx.beginPath(); ctx.ellipse(mx + 200, 420, 180, 150 + (i%2)*80, 0, Math.PI, 0); ctx.fill();
                        if (theme.bgMtnLight) { ctx.fillStyle = theme.bgMtnLight; ctx.beginPath(); ctx.ellipse(mx + 150, 420, 100, 100 + (i%2)*50, 0, Math.PI, 0); ctx.fill(); ctx.fillStyle = theme.bgMtn; }
                    }
                }
            }
            
            if (theme.treeTrunk) {
                const treeCam = options.reducedMotion ? cameraX : cameraX * 0.5;
                for(let i=0; i<Math.max(20, WORLD_WIDTH/350); i++) {
                    const tx = (i * 350 - treeCam) + (i%2)*50;
                    if (tx > -100 && tx < canvas.width + 100) { ctx.fillStyle = theme.treeTrunk; ctx.fillRect(tx, 340, 16, 80); ctx.fillStyle = theme.treeLeaves; ctx.beginPath(); ctx.arc(tx + 8, 330, 30, 0, Math.PI*2); ctx.arc(tx - 10, 350, 25, 0, Math.PI*2); ctx.arc(tx + 26, 350, 25, 0, Math.PI*2); ctx.fill(); }
                }
            }
            
            if(gameState.level >= 16 && theme.sky === '#27272a') { // Volcano Lava check
                ctx.fillStyle = '#dc2626'; ctx.fillRect(0, 460, canvas.width, 20);
                const t = Date.now() / 200; ctx.fillStyle = '#facc15'; 
                for(let i=0; i<30; i++) { ctx.fillRect((i*50 - cameraX*0.8) % canvas.width, 460 + (options.reducedMotion?0:Math.sin(t+i)*5), 20, 5); }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); drawBackground();
            ctx.save(); ctx.translate(-Math.floor(cameraX), 0);

            if (goal) goal.draw(ctx);
            for (let p of platforms) { if (p.x + p.w > cameraX - 100 && p.x < cameraX + canvas.width + 100) p.draw(ctx); }
            for (let c of coins) if (c.x > cameraX - 100 && c.x < cameraX + canvas.width + 100) c.draw(ctx);
            for (let pw of powerups) pw.draw(ctx);
            for (let e of enemies) if (e.x > cameraX - 100 && e.x < cameraX + canvas.width + 100) e.draw(ctx);
            for (let b of bosses) b.draw(ctx);
            for (let proj of projectiles) proj.draw(ctx);
            for (let f of floatingTexts) f.draw(ctx);
            for (let part of particles) part.draw(ctx);
            
            player.draw(ctx); ctx.restore();
        }

        function gameLoop(timestamp) {
            if (gameState.status !== 'PLAYING') return;
            let dt = (timestamp - gameState.lastTime) / 1000;
            if (dt > 0.05) dt = 0.05; gameState.lastTime = timestamp;
            update(dt * options.speed); draw(); requestAnimationFrame(gameLoop);
        }

        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        applySettings();
    </script>
